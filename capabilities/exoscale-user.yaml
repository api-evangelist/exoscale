    resources:
    - name: user
      path: /user
      operations:
      - name: createuser
        method: POST
        description: Create a User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listusers
        method: GET
        description: List Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: user-id
      path: /user/{id}
      operations:
      - name: updateuserrole
        method: PUT
        description: Update a User's IAM role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteuser
        method: DELETE
        description: Delete User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: exoscale-user-rest
    port: 8080
    description: REST adapter for Exoscale API — user. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/user
      name: user
      description: REST surface for user.
      operations:
      - method: POST
        name: createuser
        description: Create a User
        call: exoscale-user.createuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listusers
        description: List Users
        call: exoscale-user.listusers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/user/{id}
      name: user-id
      description: REST surface for user-id.
      operations:
      - method: PUT
        name: updateuserrole
        description: Update a User's IAM role
        call: exoscale-user.updateuserrole
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
