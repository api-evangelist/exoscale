    port: 9090
    transport: http
    description: MCP adapter for Exoscale API — user. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-user
      description: Create a User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: exoscale-user.createuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-users
