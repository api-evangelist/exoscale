naftiko: 1.0.0-alpha2
info:
  label: Exoscale API — quotas
  description: 'Exoscale API — quotas. 2 operations. Lead operation: List Organization Quotas. Self-contained Naftiko capability
    covering one Exoscale business surface.'
  tags:
  - Exoscale
  - quotas
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    EXOSCALE_API_KEY: EXOSCALE_API_KEY
capability:
  consumes:
  - type: http
    namespace: exoscale-quotas
    baseUri: https://api-{zone}.exoscale.com/v2
    description: Exoscale API — quotas business capability. Self-contained, no shared references.
    resources:
    - name: quota
      path: /quota
      operations:
      - name: listquotas
        method: GET
        description: List Organization Quotas
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: quota-entity
      path: /quota/{entity}
      operations:
      - name: getquota
        method: GET
        description: Retrieve Resource Quota
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: entity
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: exoscale-quotas-rest
    port: 8080
    description: REST adapter for Exoscale API — quotas. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/quota
      name: quota
      description: REST surface for quota.
      operations:
      - method: GET
        name: listquotas
        description: List Organization Quotas
        call: exoscale-quotas.listquotas
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/quota/{entity}
      name: quota-entity
      description: REST surface for quota-entity.
      operations:
      - method: GET
        name: getquota
        description: Retrieve Resource Quota
        call: exoscale-quotas.getquota
        with:
          entity: rest.entity
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: exoscale-quotas-mcp
    port: 9090
    transport: http
    description: MCP adapter for Exoscale API — quotas. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-organization-quotas
      description: List Organization Quotas
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: exoscale-quotas.listquotas
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-resource-quota
      description: Retrieve Resource Quota
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: exoscale-quotas.getquota
      with:
        entity: tools.entity
      outputParameters:
      - type: object
        mapping: $.
