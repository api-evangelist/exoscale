        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain-id
          in: path
          type: string
          required: true
        - name: record-id
          in: path
          type: string
          required: true
      - name: updatednsdomainrecord
        method: PUT
        description: Update DNS domain record
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain-id
          in: path
          type: string
          required: true
        - name: record-id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletednsdomainrecord
        method: DELETE
        description: Delete DNS domain record
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain-id
          in: path
          type: string
          required: true
        - name: record-id
          in: path
          type: string
          required: true
  exposes:
