        call: exoscale-record.updatednsdomainrecord
        with:
          domain-id: rest.domain-id
          record-id: rest.record-id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletednsdomainrecord
        description: Delete DNS domain record
        call: exoscale-record.deletednsdomainrecord
        with:
          domain-id: rest.domain-id
          record-id: rest.record-id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
