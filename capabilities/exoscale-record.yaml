    description: Exoscale API — record business capability. Self-contained, no shared references.
    resources:
    - name: dns-domain-domain-id-record
      path: /dns-domain/{domain-id}/record
      operations:
      - name: listdnsdomainrecords
        method: GET
        description: List DNS domain records
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain-id
          in: path
          type: string
          required: true
      - name: creatednsdomainrecord
        method: POST
        description: Create DNS domain record
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain-id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
