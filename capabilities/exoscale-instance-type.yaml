      name: instance-type-id
      description: REST surface for instance-type-id.
      operations:
      - method: GET
        name: getinstancetype
        description: Retrieve Instance Type details
        call: exoscale-instance-type.getinstancetype
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
