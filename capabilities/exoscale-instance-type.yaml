    resources:
    - name: instance-type
      path: /instance-type
      operations:
      - name: listinstancetypes
        method: GET
        description: List Compute instance Types
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: instance-type-id
      path: /instance-type/{id}
