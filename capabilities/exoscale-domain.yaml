naftiko: 1.0.0-alpha2
info:
  label: Exoscale API — domain
  description: 'Exoscale API — domain. 5 operations. Lead operation: List DNS domains. Self-contained Naftiko capability covering
    one Exoscale business surface.'
  tags:
  - Exoscale
  - domain
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    EXOSCALE_API_KEY: EXOSCALE_API_KEY
capability:
  consumes:
  - type: http
    namespace: exoscale-domain
    baseUri: https://api-{zone}.exoscale.com/v2
    description: Exoscale API — domain business capability. Self-contained, no shared references.
    resources:
    - name: dns-domain
      path: /dns-domain
      operations:
      - name: listdnsdomains
        method: GET
        description: List DNS domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: creatednsdomain
        method: POST
        description: Create DNS domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: dns-domain-id
      path: /dns-domain/{id}
      operations:
      - name: deletednsdomain
        method: DELETE
        description: Delete DNS Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: getdnsdomain
        method: GET
        description: Retrieve DNS domain details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    - name: dns-domain-id-zone
      path: /dns-domain/{id}/zone
      operations:
      - name: getdnsdomainzonefile
        method: GET
        description: Retrieve DNS domain zone file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: exoscale-domain-rest
    port: 8080
    description: REST adapter for Exoscale API — domain. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/dns-domain
      name: dns-domain
      description: REST surface for dns-domain.
      operations:
      - method: GET
        name: listdnsdomains
        description: List DNS domains
        call: exoscale-domain.listdnsdomains
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: creatednsdomain
        description: Create DNS domain
        call: exoscale-domain.creatednsdomain
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/dns-domain/{id}
      name: dns-domain-id
      description: REST surface for dns-domain-id.
      operations:
      - method: DELETE
        name: deletednsdomain
        description: Delete DNS Domain
        call: exoscale-domain.deletednsdomain
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getdnsdomain
        description: Retrieve DNS domain details
        call: exoscale-domain.getdnsdomain
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/dns-domain/{id}/zone
      name: dns-domain-id-zone
      description: REST surface for dns-domain-id-zone.
      operations:
      - method: GET
        name: getdnsdomainzonefile
        description: Retrieve DNS domain zone file
        call: exoscale-domain.getdnsdomainzonefile
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: exoscale-domain-mcp
    port: 9090
    transport: http
    description: MCP adapter for Exoscale API — domain. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-dns-domains
      description: List DNS domains
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: exoscale-domain.listdnsdomains
      outputParameters:
      - type: object
        mapping: $.
    - name: create-dns-domain
      description: Create DNS domain
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: exoscale-domain.creatednsdomain
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-dns-domain
      description: Delete DNS Domain
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: exoscale-domain.deletednsdomain
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-dns-domain-details
      description: Retrieve DNS domain details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: exoscale-domain.getdnsdomain
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-dns-domain-zone-file
      description: Retrieve DNS domain zone file
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: exoscale-domain.getdnsdomainzonefile
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
