naftiko: 1.0.0-alpha2
info:
  label: Exoscale API — operation
  description: 'Exoscale API — operation. 1 operations. Lead operation: Retrieve Operation details. Self-contained Naftiko
    capability covering one Exoscale business surface.'
  tags:
  - Exoscale
  - operation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    EXOSCALE_API_KEY: EXOSCALE_API_KEY
capability:
  consumes:
  - type: http
    namespace: exoscale-operation
    baseUri: https://api-{zone}.exoscale.com/v2
    description: Exoscale API — operation business capability. Self-contained, no shared references.
    resources:
    - name: operation-id
      path: /operation/{id}
      operations:
      - name: getoperation
        method: GET
        description: Retrieve Operation details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: exoscale-operation-rest
    port: 8080
    description: REST adapter for Exoscale API — operation. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/operation/{id}
      name: operation-id
      description: REST surface for operation-id.
      operations:
      - method: GET
        name: getoperation
        description: Retrieve Operation details
        call: exoscale-operation.getoperation
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: exoscale-operation-mcp
    port: 9090
    transport: http
    description: MCP adapter for Exoscale API — operation. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: retrieve-operation-details
      description: Retrieve Operation details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: exoscale-operation.getoperation
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
