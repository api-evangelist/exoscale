        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    - name: elastic-ip-id-field
      path: /elastic-ip/{id}/{field}
      operations:
      - name: resetelasticipfield
        method: DELETE
        description: Reset an Elastic IP field to its default value
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: field
          in: path
          type: string
