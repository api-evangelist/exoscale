    resources:
    - name: elastic-ip
      path: /elastic-ip
      operations:
      - name: createelasticip
        method: POST
        description: Create an Elastic IP
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listelasticips
        method: GET
        description: List Elastic IPs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: elastic-ip-id
