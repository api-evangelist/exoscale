aid: exoscale
name: Exoscale
description: Exoscale is a Swiss cloud infrastructure provider offering secure, reliable, and scalable cloud solutions to
  businesses of all sizes. Their services include virtual machines, object storage, networking, security, Kubernetes (SKS),
  Database as a Service (DBaaS), and IAM. Data centers are located in Switzerland, Austria, Germany, and Bulgaria, providing
  data sovereignty and compliance with European data protection regulations.
