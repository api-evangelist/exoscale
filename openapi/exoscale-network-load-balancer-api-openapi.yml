    name: Exoscale Support
    url: https://portal.exoscale.com/tickets
  title: Exoscale ai-api-key network-load-balancer API
  description: Infrastructure automation API, allowing programmatic access to all Exoscale products and services.
servers:
- url: https://api-{zone}.exoscale.com/v2
  variables:
    zone:
      default: ch-gva-2
      enum:
      - ch-gva-2
      - ch-dk-2
      - de-fra-1
      - de-muc-1
      - at-vie-1
      - at-vie-2
      - bg-sof-1
      - hr-zag-1
tags:
- description: "A Network Load Balancer (NLB) is a Layer 4 (TCP/UDP)\n                   load balancer that distributes incoming traffic to Compute\n                   instances managed by an Instance Pool."
  parent: compute
  externalDocs:
    description: Read more
    url: https://community.exoscale.com/documentation/compute/network-load-balancer/
  name: network-load-balancer
  x-display-name: Network Load Balancer
  x-weight: 180
  x-icon: exo-nlb
