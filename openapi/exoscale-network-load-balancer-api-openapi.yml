      description: ''
      parameters:
      - in: path
        required: true
        name: id
        schema:
          type: string
          format: uuid
      - in: path
        required: true
        name: service-id
        schema:
          type: string
          format: uuid
      summary: Retrieve Load Balancer Service details
      operationId: get-load-balancer-service
