      tags:
      - network-load-balancer
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/operation'
      description: ''
      parameters:
      - in: path
        required: true
        name: id
        schema:
          type: string
          format: uuid
      - in: path
        required: true
        name: service-id
        schema:
          type: string
          format: uuid
      summary: Delete a Load Balancer Service
      operationId: delete-load-balancer-service
