            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                  description: Load Balancer Service name
                description:
                  type: string
                  maxLength: 255
                  description: Load Balancer Service description
                protocol:
                  type: string
                  enum:
                  - tcp
                  - udp
                  description: Network traffic protocol
                strategy:
                  type: string
                  enum:
                  - round-robin
                  - maglev-hash
                  - source-hash
                  description: Load balancing strategy
                port:
                  type: integer
