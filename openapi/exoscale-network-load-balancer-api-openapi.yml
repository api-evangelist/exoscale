          - http
          - https
          description: Healthcheck mode
        interval:
          type: integer
          format: int64
          minimum: 5
          maximum: 300
          exclusiveMinimum: false
          exclusiveMaximum: false
          description: 'Healthcheck interval (default: 10). Must be greater than or equal to Timeout'
        uri:
          type: string
          maxLength: 255
          minLength: 1
          description: An endpoint to use for the HTTP healthcheck, e.g. '/status'
        port:
          type: integer
          format: int64
          minimum: 1
          maximum: 65535
          exclusiveMinimum: false
          exclusiveMaximum: false
          description: Healthcheck port
        timeout:
          type: integer
          format: int64
          minimum: 2
          maximum: 60
          exclusiveMinimum: false
          exclusiveMaximum: false
          description: 'Healthcheck timeout value (default: 2). Must be lower than or equal to Interval'
        retries:
          type: integer
          format: int64
          minimum: 1
          maximum: 20
          exclusiveMinimum: false
          exclusiveMaximum: false
          description: Number of retries before considering a Service failed
        tls-sni:
          type: string
          maxLength: 255
          minLength: 1
          description: SNI domain for HTTPS healthchecks
