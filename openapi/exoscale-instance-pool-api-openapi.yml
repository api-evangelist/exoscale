        security-groups:
          type: array
          items:
            $ref: '#/components/schemas/security-group-ref'
          description: Instance Pool Security Groups
        elastic-ips:
          type: array
          items:
            $ref: '#/components/schemas/elastic-ip-ref'
          description: Instances Elastic IPs
        name:
          type: string
          maxLength: 255
          minLength: 1
          description: Instance Pool name
        instance-type:
          $ref: '#/components/schemas/instance-type-ref'
          description: Instances type
        min-available:
          type: integer
          format: int64
          minimum: 0
          exclusiveMinimum: false
          description: Minimum number of running instances
        private-networks:
          type: array
          items:
            $ref: '#/components/schemas/private-network-ref'
          description: Instance Pool Private Networks
        template:
          $ref: '#/components/schemas/template-ref'
          description: Instances template
        state:
          type: string
          enum:
          - scaling-up
          - scaling-down
          - destroying
          - creating
          - suspended
          - running
          - updating
          readOnly: true
          description: Instance Pool state
        size:
          type: integer
          format: int64
          minimum: 0
          exclusiveMinimum: true
          description: Number of instances
        ssh-key:
          $ref: '#/components/schemas/ssh-key-ref'
          description: Instances SSH key
        instance-prefix:
          type: string
          maxLength: 30
          minLength: 1
          description: 'The instances created by the Instance Pool will be prefixed with this value (default: pool)'
        user-data:
          type: string
          minLength: 1
          description: Instances Cloud-init user-data
        manager:
          $ref: '#/components/schemas/manager'
          readOnly: true
          description: Instance Pool manager
        instances:
          type: array
          items:
            $ref: '#/components/schemas/instance-ref'
          readOnly: true
          description: Instances
        deploy-target:
          $ref: '#/components/schemas/deploy-target-ref'
          description: Instance Pool Deploy Target
        ipv6-enabled:
          type: boolean
          description: Enable IPv6 for instances
        id:
          type: string
          format: uuid
          readOnly: true
          description: Instance Pool ID
        disk-size:
          type: integer
          format: int64
          minimum: 10
          maximum: 51200
          exclusiveMinimum: false
          exclusiveMaximum: false
          description: Instances disk size in GiB
        ssh-keys:
          type: array
          items:
            $ref: '#/components/schemas/ssh-key-ref'
          description: Instances SSH keys
      description: Instance Pool
    manager:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Manager ID
        type:
          type: string
          enum:
          - sks-nodepool
          - instance-pool
          description: Manager type
