openapi: 3.0.0
info:
  version: 2.0.0
  termsOfService: https://exoscale.com/terms
  contact:
    email: support@exoscale.com
    name: Exoscale Support
    url: https://portal.exoscale.com/tickets
  title: Exoscale ai-api-key instance-pool API
  description: Infrastructure automation API, allowing programmatic access to all Exoscale products and services.
servers:
- url: https://api-{zone}.exoscale.com/v2
  variables:
    zone:
      default: ch-gva-2
      enum:
      - ch-gva-2
      - ch-dk-2
      - de-fra-1
      - de-muc-1
      - at-vie-1
      - at-vie-2
      - bg-sof-1
      - hr-zag-1
tags:
- description: "Instance Pools is an Exoscale service allowing users\n                   to provision managed groups of identical Compute\n                   instances automatically."
  parent: compute
  externalDocs:
    description: Read more
    url: https://community.exoscale.com/documentation/compute/instance-pools/
  name: instance-pool
  x-display-name: Instance Pool
  x-weight: 120
  x-icon: exo-vmpool
paths:
  /instance-pool/{id}:scale:
    put:
      tags:
      - instance-pool
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/operation'
      description: ''
      parameters:
      - in: path
        required: true
        name: id
        schema:
          type: string
          format: uuid
      summary: Scale an Instance Pool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                size:
                  type: integer
                  format: int64
                  minimum: 0
                  exclusiveMinimum: false
                  description: Number of managed Instances
              required:
              - size
      operationId: scale-instance-pool
  /instance-pool:
    get:
      tags:
      - instance-pool
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                type: object
                properties:
                  instance-pools:
                    type: array
                    items:
                      $ref: '#/components/schemas/instance-pool'
      description: ''
      parameters: []
      summary: List Instance Pools
      operationId: list-instance-pools
    post:
      tags:
      - instance-pool
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/operation'
      description: ''
      parameters: []
      summary: Create an Instance Pool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                application-consistent-snapshot-enabled:
                  type: boolean
                  description: Enable application consistent snapshots
                anti-affinity-groups:
                  type: array
                  items:
                    $ref: '#/components/schemas/anti-affinity-group-ref'
                  uniqueItems: true
                  description: Instance Pool Anti-affinity Groups
                description:
                  type: string
                  maxLength: 255
                  description: Instance Pool description
                public-ip-assignment:
                  type: string
                  enum:
                  - inet4
                  - dual
                  - none
                  description: Determines public IP assignment of the Instances. Type `none` is final and can't be changed later on.
                labels:
                  $ref: '#/components/schemas/labels'
                  description: Instance Pool Labels
                security-groups:
                  type: array
                  items:
                    $ref: '#/components/schemas/security-group-ref'
                  uniqueItems: true
                  description: Instance Pool Security Groups
                elastic-ips:
                  type: array
                  items:
                    $ref: '#/components/schemas/elastic-ip-ref'
                  uniqueItems: true
                  description: Instances Elastic IPs
                name:
                  type: string
                  maxLength: 255
                  minLength: 1
                  description: Instance Pool name
                instance-type:
                  $ref: '#/components/schemas/instance-type-ref'
                  description: Instances type
                min-available:
                  type: integer
                  format: int64
                  minimum: 0
                  exclusiveMinimum: false
                  description: Minimum number of running Instances
                private-networks:
                  type: array
                  items:
                    $ref: '#/components/schemas/private-network-ref'
                  uniqueItems: true
                  description: Instance Pool Private Networks
                template:
                  $ref: '#/components/schemas/template-ref'
                  description: Instances template
                size:
                  type: integer
                  format: int64
                  minimum: 0
                  exclusiveMinimum: true
                  description: Number of Instances
                ssh-key:
                  $ref: '#/components/schemas/ssh-key-ref'
                  description: Instances SSH key
                instance-prefix:
                  type: string
                  maxLength: 30
                  minLength: 1
                  description: 'Prefix to apply to Instances names (default: pool)'
                user-data:
                  type: string
                  maxLength: 32768
                  minLength: 1
                  description: Instances Cloud-init user-data
                deploy-target:
                  $ref: '#/components/schemas/deploy-target-ref'
                  description: Deploy Target to deploy Instances on
                ipv6-enabled:
                  type: boolean
                  description: 'Enable IPv6. DEPRECATED: use `public-ip-assignments`.'
                disk-size:
                  type: integer
                  format: int64
                  minimum: 10
                  maximum: 51200
                  exclusiveMinimum: false
                  exclusiveMaximum: false
                  description: Instances disk size in GiB
                ssh-keys:
                  type: array
                  items:
                    $ref: '#/components/schemas/ssh-key-ref'
                  uniqueItems: true
                  description: Instances SSH Keys
              required:
              - name
              - size
              - instance-type
              - template
              - disk-size
      operationId: create-instance-pool
  /instance-pool/{id}:
    delete:
      tags:
      - instance-pool
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/operation'
      description: ''
      parameters:
      - in: path
        required: true
        name: id
        schema:
          type: string
          format: uuid
      summary: Delete an Instance Pool
      operationId: delete-instance-pool
    get:
      tags:
      - instance-pool
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/instance-pool'
      description: ''
      parameters:
      - in: path
        required: true
        name: id
        schema:
          type: string
          format: uuid
      summary: Retrieve Instance Pool details
      operationId: get-instance-pool
    put:
      tags:
      - instance-pool
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/operation'
      description: ''
      parameters:
      - in: path
        required: true
        name: id
        schema:
          type: string
          format: uuid
      summary: Update an Instance Pool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                application-consistent-snapshot-enabled:
                  type: boolean
                  description: Enable application consistent snapshots
                anti-affinity-groups:
                  type: array
                  items:
                    $ref: '#/components/schemas/anti-affinity-group-ref'
                  uniqueItems: true
                  nullable: true
                  description: Instance Pool Anti-affinity Groups
                description:
                  type: string
                  maxLength: 255
                  description: Instance Pool description
                public-ip-assignment:
                  type: string
                  enum:
                  - inet4
                  - dual
                  description: Determines public IP assignment of the Instances.
                labels:
                  $ref: '#/components/schemas/labels'
                  description: Instance Pool Labels
                security-groups:
                  type: array
                  items:
                    $ref: '#/components/schemas/security-group-ref'
                  uniqueItems: true
                  nullable: true
                  description: Instance Pool Security Groups
                elastic-ips:
                  type: array
                  items:
                    $ref: '#/components/schemas/elastic-ip-ref'
                  nullable: true
                  description: Instances Elastic IPs
                name:
                  type: string
                  maxLength: 255
                  minLength: 1
                  description: Instance Pool name
                instance-type:
                  $ref: '#/components/schemas/instance-type-ref'
                  description: Instances type
                min-available:
                  type: integer
                  format: int64
                  minimum: 0
                  exclusiveMinimum: false
                  nullable: true
                  description: Minimum number of running Instances
                private-networks:
                  type: array
                  items:
                    $ref: '#/components/schemas/private-network-ref'
                  uniqueItems: true
                  nullable: true
                  description: Instance Pool Private Networks
                template:
                  $ref: '#/components/schemas/template-ref'
                  description: Instances template
                ssh-key:
                  $ref: '#/components/schemas/ssh-key-ref'
                  nullable: true
                  description: Instances SSH key
                instance-prefix:
                  type: string
                  nullable: true
                  description: 'Prefix to apply to Instances names (default: pool)'
                user-data:
                  type: string
                  minLength: 1
                  nullable: true
                  description: Instances Cloud-init user-data
                deploy-target:
                  $ref: '#/components/schemas/deploy-target-ref'
                  nullable: true
                  description: Instance Pool Deploy Target
                ipv6-enabled:
                  type: boolean
                  description: 'Enable IPv6. DEPRECATED: use `public-ip-assignments`.'
                disk-size:
                  type: integer
                  format: int64
                  minimum: 10
                  maximum: 51200
                  exclusiveMinimum: false
                  exclusiveMaximum: false
                  description: Instances disk size in GiB
                ssh-keys:
                  type: array
                  items:
                    $ref: '#/components/schemas/ssh-key-ref'
                  uniqueItems: true
                  nullable: true
                  description: Instances SSH keys
      operationId: update-instance-pool
  /instance-pool/{id}/{field}:
    delete:
      tags:
      - instance-pool
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/operation'
      description: ''
      parameters:
      - in: path
        required: true
        name: id
        schema:
          type: string
          format: uuid
      - in: path
        required: true
        name: field
        schema:
          type: string
          enum:
          - anti-affinity-groups
          - description
          - labels
          - security-groups
          - elastic-ips
          - private-networks
          - ssh-key
          - user-data
          - deploy-target
          - ipv6-enabled
      summary: Reset an Instance Pool field to its default value
      operationId: reset-instance-pool-field
  /instance-pool/{id}:evict:
    put:
      tags:
      - instance-pool
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/operation'
      description: This operation evicts the specified Compute instances member from the Instance Pool, shrinking it to `&lt;current pool size&gt; - &lt;# evicted members&gt;`.
      parameters:
      - in: path
        required: true
        name: id
        schema:
          type: string
          format: uuid
      summary: Evict Instance Pool members
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                instances:
                  type: array
                  items:
                    type: string
                    format: uuid
      operationId: evict-instance-pool-members
